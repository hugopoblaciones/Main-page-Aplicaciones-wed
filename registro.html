<!-- ========================================
     PÁGINA DE REGISTRO
     ======================================== -->

<!-- DOCTYPE: declara que el documento usa HTML5 -->
<!DOCTYPE html>

<!-- html: etiqueta raíz. lang="es" indica idioma español -->
<html lang="es">

<!-- head: configuración de la página, no visible por el usuario -->
<head>
    <!-- meta charset: permite usar tildes y caracteres especiales -->
    <meta charset="UTF-8">
    <!-- title: texto de la pestaña del navegador -->
    <title>Registro - Tech Wise</title>
    <!-- link: carga el CSS general (fondo, fuente...) -->
    <link rel="stylesheet" href="styles.css">
    <!-- link: carga el CSS específico de esta página -->
    <link rel="stylesheet" href="registro.css">
</head>

<!-- body: contenido visible de la página -->
<body>

    <!-- div login-container: caja central que contiene el formulario de registro -->
    <div class="login-container">
        <!-- h2: título del formulario -->
        <h2>Crear Cuenta</h2>

        <!-- form: contenedor del formulario de registro -->
        <form>
            <!-- input type="text": campo de texto para el nombre del usuario -->
            <input type="text" placeholder="Nombre completo" required>

            <!-- input type="email": campo que valida que se escriba un email correcto -->
            <input type="email" placeholder="Correo electrónico" required>

            <!-- input type="password": campo que oculta lo que se escribe con asteriscos -->
            <input type="password" placeholder="Contraseña" required>

            <!-- input type="password": segundo campo para confirmar que la contraseña es correcta -->
            <input type="password" placeholder="Confirmar contraseña" required>

            <!-- a btn-registro: botón para crear la cuenta -->
            <a href="#" class="btn-registro">Crear Cuenta</a>
        </form>

        <!-- a: enlace para ir a la página de inicio de sesión si ya tienes cuenta -->
        <a href="inicio-sesion.html" class="btn-secundario">¿Ya tienes cuenta? Inicia sesión</a>

        <!-- a volver: enlace para regresar a la página principal -->
        <a href="index.html" class="volver">Volver a la tienda</a>
    </div>

</body>
</html>
